name: Deploy WordPress Theme

on:
  push:
    branches:
      - main
    paths:
      - 'theme/**'
  workflow_dispatch:

jobs:
  deploy:
    name: FTP Deploy to WPX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server:     ${{ secrets.FTP_SERVER }}
          username:   ${{ secrets.FTP_USER }}
          password:   ${{ secrets.FTP_PASS }}
          local-dir:  ./theme/sosuke-sato/
          # WPX の場合 public_html 配下が Web ルート
          # WordPress インストール先に合わせて適宜変更してください
          server-dir: /public_html/wp-content/themes/sosuke-sato/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store
