name: Deploy WordPress Theme

on:
  push:
    branches:
      - main
    paths:
      - 'theme/**'
  workflow_dispatch:

jobs:
  deploy:
    name: FTP Deploy to WPX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check secrets
        run: |
          if [ -z "$FTP_SERVER" ] || [ -z "$FTP_USER" ] || [ -z "$FTP_PASS" ]; then
            echo "::error::GitHub Secrets が未設定です。Settings > Secrets and variables > Actions で FTP_SERVER / FTP_USER / FTP_PASS を登録してください。"
            exit 1
          fi
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER:   ${{ secrets.FTP_USER }}
          FTP_PASS:   ${{ secrets.FTP_PASS }}

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER:   ${{ secrets.FTP_USER }}
          FTP_PASS:   ${{ secrets.FTP_PASS }}
        run: |
          # ~/.netrc に認証情報を書き込むことでパスワード内の特殊文字を安全に扱う
          echo "machine $FTP_SERVER login $FTP_USER password $FTP_PASS" > ~/.netrc
          chmod 600 ~/.netrc

          lftp "$FTP_SERVER" -e "
            set ftp:ssl-allow true;
            set ssl:verify-certificate false;
            mirror -R --verbose --delete \
              --exclude-glob=.git \
              --exclude-glob=.DS_Store \
              theme/sosuke-sato/ /public_html/wp-content/themes/sosuke-sato/;
            bye
          "

          rm -f ~/.netrc
