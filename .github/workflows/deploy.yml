name: Deploy WordPress Theme

on:
  push:
    branches:
      - main
    paths:
      - 'theme/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: FTP Deploy to WPX
    runs-on: ubuntu-latest
    environment: FTP_SERVER   # Variables タブで登録した Environment 名

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check variables
        run: |
          if [ -z "$FTP_SERVER" ] || [ -z "$FTP_USER" ] || [ -z "$FTP_PASS" ]; then
            echo "::error::FTP 変数が未設定です。Settings > Environments > FTP_SERVER で FTP_SERVER / FTP_USER / FTP_PASS を確認してください。"
            exit 1
          fi
        env:
          FTP_SERVER: ${{ vars.FTP_SERVER }}
          FTP_USER:   ${{ vars.FTP_USER }}
          FTP_PASS:   ${{ vars.FTP_PASS }}

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_SERVER: ${{ vars.FTP_SERVER }}
          FTP_USER:   ${{ vars.FTP_USER }}
          FTP_PASS:   ${{ vars.FTP_PASS }}
        run: |
          echo "machine $FTP_SERVER login $FTP_USER password $FTP_PASS" > ~/.netrc
          chmod 600 ~/.netrc

          lftp "$FTP_SERVER" -e "
            set ftp:ssl-allow true;
            set ssl:verify-certificate false;
            mirror -R --verbose --delete \
              --exclude-glob=.git \
              --exclude-glob=.DS_Store \
              theme/sosuke-sato/ /sato-sosuke.com/public_html/wp-content/themes/sosuke-sato/;
            bye
          "

          rm -f ~/.netrc
