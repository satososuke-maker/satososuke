name: Deploy WordPress Theme

on:
  push:
    branches:
      - main
    paths:
      - 'theme/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: FTP Deploy to WPX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER:   ${{ secrets.FTP_USER }}
          FTP_PASS:   ${{ secrets.FTP_PASS }}
        run: |
          cat > /tmp/deploy.lftp << LFTP_END
          open ftp://$FTP_SERVER
          user $FTP_USER $FTP_PASS
          set ftp:ssl-allow true
          set ssl:verify-certificate false
          mirror -R --verbose --delete --exclude-glob=.git --exclude-glob=.DS_Store theme/sosuke-sato/ /sato-sosuke.com/public_html/wp-content/themes/sosuke-sato/
          bye
          LFTP_END

          lftp -f /tmp/deploy.lftp
          rm -f /tmp/deploy.lftp
